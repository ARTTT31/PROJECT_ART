# docker-compose.yml - Performance & Resource Optimized for Local Dev

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: art_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-art_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-art_password_dev}
      POSTGRES_DB: ${POSTGRES_DB:-art_workspace}
    ports:
      - "5432:5432"
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U art_user -d art_workspace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: art_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-art_user}:${POSTGRES_PASSWORD:-art_password_dev}@postgres:5432/${POSTGRES_DB:-art_workspace}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:8000,http://localhost:8080,http://localhost:3000,http://frontend:3000
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    mem_limit: 384m
    cpus: 0.5
    volumes:
      # :cached flag improves Docker Desktop bind mount perf on Windows/macOS
      - ./backend:/app:cached
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-delay 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s  # Less frequent healthchecks = less CPU
      timeout: 5s
      retries: 3
      start_period: 15s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: art_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_INTERNAL_URL: http://backend:8000
      NODE_OPTIONS: "--max-old-space-size=384"  # Reduced from 512 for lower RAM
      # Hot Reload Configuration (Windows optimized)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 2000  # Increased from 1000ms — less CPU polling
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    mem_limit: 768m
    cpus: 0.75
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
      - /app/.next
      - /app/.swc
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s  # Less frequent than 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local